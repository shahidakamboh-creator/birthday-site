<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>for you 💌</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #ffe6f0, #fff0f5, #ffeef8);
  overflow: hidden;
  text-align: center;
  color: #b30059;
}

/* floating hearts */
.heart {
  position: absolute;
  width: 15px;
  height: 15px;
  background: pink;
  transform: rotate(45deg);
  animation: float 8s infinite ease-in;
  opacity: 0.6;
}

.heart:before,
.heart:after {
  content: "";
  position: absolute;
  width: 15px;
  height: 15px;
  background: pink;
  border-radius: 50%;
}

.heart:before { top: -7px; left: 0; }
.heart:after { left: -7px; top: 0; }

@keyframes float {
  0% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
  50% { opacity: 0.8; }
  100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
}

.container {
  margin-top: 120px;
  padding: 20px;
}

h1 {
  font-size: 32px;
  letter-spacing: 1px;
}

p {
  font-size: 18px;
  opacity: 0.9;
}

button {
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  font-family: Georgia;
  transition: 0.3s;
}

.btn1 {
  background: #ffb6c1;
}

.btn2 {
  background: #ffd6e7;
}

button:hover {
  transform: scale(1.05);
}

.hidden {
  display: none;
}

/* soft glow box */
.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  padding: 25px;
  border-radius: 20px;
  display: inline-block;
  box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
}
</style>
</head>

<body>

<!-- floating hearts -->
<script>
for (let i = 0; i < 25; i++) {
  let h = document.createElement("div");
  h.className = "heart";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (4 + Math.random() * 6) + "s";
  document.body.appendChild(h);
}
</script>

<div class="container">

<div id="page1" class="card">
  <h1>hi you 💗</h1>
  <p>i made this for someone very special</p>
  <button class="btn1" onclick="next1()">open it</button>
</div>

<div id="page2" class="card hidden">
  <h1>do you want to continue? 🎀</h1>
  <button class="btn1" onclick="next2()">yes</button>
  <button class="btn2" onclick="next2()">of course yes</button>
</div>

<div id="page3" class="card hidden">
  <h1>💌</h1>
  <p>
    happy birthday / i love you / i miss you / always thinking of you<br><br>
    you mean more than you know ♡
  </p>

  <h3>🎧 voice message:</h3>
  <audio controls>
    <source src="voice.mp3" type="audio/mpeg">
  </audio>
</div>

</div>

<script>
function next1(){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}

function next2(){
  document.getElementById("page2").classList.add("hidden");
  document.getElementById("page3").classList.remove("hidden");
}
</script>

</body>
</html>
